<div class="flex flex-col gap-4">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-bold">Gerenciamento de Usuários</h1>
        <p-button label="Novo Usuário" icon="pi pi-plus" (onClick)="novoUsuario()" severity="primary" />
    </div>

    <p-card>
        <p-table 
            [value]="data()" 
            [lazy]="true" 
            (onLazyLoad)="carregarDados($event)" 
            [paginator]="true" 
            [rows]="10" 
            [totalRecords]="totalRecords()" 
            [loading]="loading()"
            styleClass="p-datatable-gridlines p-datatable-sm"
        >
            <ng-template pTemplate="header">
                <tr>
                    <th pSortableColumn="id" class="w-20">ID <p-sortIcon field="id"></p-sortIcon></th>
                    <th pSortableColumn="name">Nome <p-sortIcon field="name"></p-sortIcon></th>
                    <th pSortableColumn="username">Usuário <p-sortIcon field="username"></p-sortIcon></th>
                    <th pSortableColumn="email">E-mail <p-sortIcon field="email"></p-sortIcon></th>
                    <th pSortableColumn="is_admin" class="w-32 text-center">Tipo <p-sortIcon field="is_admin"></p-sortIcon></th>
                    <th pSortableColumn="is_active" class="w-32 text-center">Status <p-sortIcon field="is_active"></p-sortIcon></th>
                    <th class="w-40 text-center">Ações</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-user>
                <tr>
                    <td>{{ user.id }}</td>
                    <td class="font-medium">{{ user.name }}</td>
                    <td>{{ user.username }}</td>
                    <td>{{ user.email }}</td>
                    <td class="text-center">
                        @if (user.is_admin) {
                            <span class="bg-purple-100 text-purple-800 text-xs font-semibold px-2 py-1 rounded dark:bg-purple-900/30 dark:text-purple-300">Admin</span>
                        } @else {
                            <span class="bg-gray-100 text-gray-800 text-xs font-semibold px-2 py-1 rounded dark:bg-gray-800 dark:text-gray-300">Comum</span>
                        }
                    </td>
                    <td class="text-center">
                        @if (user.is_active) {
                            <span class="bg-green-100 text-green-800 text-xs font-semibold px-2 py-1 rounded dark:bg-green-900/30 dark:text-green-300">Ativo</span>
                        } @else {
                            <span class="bg-red-100 text-red-800 text-xs font-semibold px-2 py-1 rounded dark:bg-red-900/30 dark:text-red-300">Inativo</span>
                        }
                    </td>
                    <td class="flex justify-center gap-2">
                        <p-button icon="pi pi-pencil" (onClick)="editarUsuario(user)" [outlined]="true" severity="info" size="small" pTooltip="Editar" tooltipPosition="top" />
                        <p-button icon="pi pi-key" (onClick)="alterarSenha(user)" [outlined]="true" severity="warn" size="small" pTooltip="Mudar Senha" tooltipPosition="top" />
                        <p-button icon="pi pi-trash" (onClick)="excluir($event, user)" [disabled]="isCurrentUser(user.id)" [outlined]="true" severity="danger" size="small" pTooltip="Excluir" tooltipPosition="top" />
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="7" class="text-center p-4">Nenhum usuário encontrado.</td>
                </tr>
            </ng-template>
        </p-table>
    </p-card>
</div>
