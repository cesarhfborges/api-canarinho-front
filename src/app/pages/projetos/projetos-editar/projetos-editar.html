<div class="flex flex-col gap-4">

    <!-- HEADER -->
    <p-card class="flex-none">

        <ng-template #title>
            API Endpoint {{ id }}
        </ng-template>

        <ng-template #subtitle>
            Ambiente de geração de dados mock
        </ng-template>

        <div
            class="font-mono text-sm p-3 rounded-lg bg-surface-100 dark:bg-surface-800"
        >
            {{ getEndpointURL(':project') }}
        </div>

        <ng-template #footer>

            <div
                class="flex flex-col sm:flex-row gap-2 sm:gap-4 mt-2"
            >

                <p-button
                    icon="pi pi-plus"
                    label="Novo Endpoint"
                    severity="info"
                />

                <p-button
                    icon="pi pi-play"
                    label="Gerar Todos"
                    severity="secondary"
                />

                <p-button
                    icon="pi pi-refresh"
                    label="Reset"
                    severity="contrast"
                />

            </div>

        </ng-template>

    </p-card>

    <!-- TREE -->
    <div class="card flex-auto">

        <p-tree
            [value]="files()"
            class="w-full"
        >

            <ng-template
                let-node
                pTemplate="default"
            >

                <div
                    [class.opacity-60]="isLoading(node.data.endpoint.id)"
                    class="flex flex-col lg:flex-row lg:items-center gap-3 lg:gap-4 py-3 px-3 border-b border-surface-200 dark:border-surface-700 last:border-b-0 rounded-md hover:bg-surface-100 dark:hover:bg-surface-800 transition-all"
                >

                    <!-- NOME -->
                    <div
                        class="flex-1 min-w-0"
                    >

                        <div
                            class="flex items-center gap-2 min-w-0"
                        >

                            <span
                                class="font-semibold truncate"
                            >
                                {{ node.key }} - {{ node.label }}
                            </span>

                            @if (isLoading(node.data.endpoint.id)) {

                                <span
                                    class="inline-flex items-center gap-1 px-2 py-1 rounded-full bg-primary-50 text-primary text-xs dark:bg-primary-900/20"
                                >

                                    <i
                                        class="pi pi-spin pi-spinner"
                                    ></i>

                                    Gerando

                                </span>

                            }

                        </div>

                    </div>

                    <!-- QUANTIDADE -->
                    <div
                        class="flex items-center gap-3 w-full lg:w-auto lg:min-w-[360px]"
                    >

                        <span
                            class="text-sm text-surface-500 whitespace-nowrap"
                        >
                            Quantidade
                        </span>

                        <p-slider
                            (onSlideEnd)="gerarDadosMock($event, node.data)"
                            [(ngModel)]="node.data.endpoint.count"
                            [disabled]="isLoading(node.data.endpoint.id)"
                            [max]="500"
                            [min]="0"
                            class="flex-1 lg:w-56"
                        />

                        <span
                            class="font-semibold text-primary min-w-[48px] text-center"
                        >
                            {{ node.data.endpoint.count }}
                        </span>

                    </div>

                    <!-- AÇÕES -->
                    <div
                        class="flex justify-end gap-2 shrink-0"
                    >

                        <p-button
                            [disabled]="isLoading(node.data.endpoint.id)"
                            [outlined]="true"
                            icon="pi pi-database"
                            pTooltip="Visualizar dados"
                            severity="secondary"
                            size="small"
                            tooltipPosition="top"
                        />

                        <p-button
                            (click)="editar(node.data.endpoint)"
                            [disabled]="isLoading(node.data.endpoint.id)"
                            [outlined]="true"
                            icon="pi pi-cog"
                            pTooltip="Configurar endpoint"
                            severity="info"
                            size="small"
                            tooltipPosition="top"
                        />

                        <p-button
                            [disabled]="isLoading(node.data.endpoint.id)"
                            [outlined]="true"
                            icon="pi pi-trash"
                            pTooltip="Excluir endpoint"
                            severity="danger"
                            size="small"
                            tooltipPosition="top"
                        />

                    </div>

                </div>

            </ng-template>

        </p-tree>

    </div>

</div>
