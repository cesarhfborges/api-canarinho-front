<div class="h-full overflow-y-auto">
    <p-card class="dark:border dark:border-gray-500/40 shadow-sm">

        <ng-template #title>
            <div class="flex items-center justify-between gap-3">

                <div>
                    <h2 class="text-lg font-bold text-slate-700 !mb-0">
                        Pautas
                    </h2>

                    <p class="text-xs text-slate-500">
                        Selecione uma pauta para gerenciamento
                    </p>
                </div>

                <p-button
                    (onClick)="editarPauta()"
                    icon="pi pi-plus"
                    label="Nova Pauta"
                    severity="success" />

            </div>
        </ng-template>

        <div class="flex flex-row">
            <div class="flex flex-col gap-3">
                @for (pauta of pautas(); track pauta.id) {

                    <app-pauta-card
                        (onEditar)="editarPauta($event)"
                        (onExcluir)="confirmarExcluir($event)"
                        (onSelecionar)="selecionarPauta($event)"
                        [estaSelecionada]="pautaSelecionada()?.id === pauta.id"
                        [pauta]="pauta"
                        [reuniaoId]="reuniaoId()"
                    />

                } @empty {
                    <div class="py-8 text-center text-slate-400">
                        @if (this.loading()) {
                            <i class="pi pi-inbox text-2xl mb-2 block"></i>
                            <p>
                                Carregando...
                            </p>
                        } @else {
                            <i class="pi pi-inbox text-2xl mb-2 block"></i>
                            <p>
                                Nenhuma pauta cadastrada.
                            </p>
                        }
                    </div>
                }
            </div>
        </div>
    </p-card>
</div>
