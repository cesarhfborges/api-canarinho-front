<form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="flex flex-col gap-6">

        <div class="flex flex-col gap-2">
            <label for="tempo" class="text-sm font-medium text-surface-700 dark:text-surface-300">Tempo</label>
            <input
                pInputText
                formControlName="tempo"
                pInputMask="99:99:99"
                placeholder="00:00:00"
                slotChar="__:__:__"
            />
        </div>

        <div class="bg-surface-50 dark:bg-surface-800/50 p-4 rounded-lg border border-surface-100 dark:border-surface-800 flex flex-col gap-5">

            <div class="flex items-center justify-between">
                <div class="flex flex-col gap-0.5">
                    <label for="exigeCodigoVoto" class="text-sm font-medium text-surface-700 dark:text-surface-300">Exigir
                        código</label>
                    <span class="text-xs text-surface-500">Solicita validação por OTP para votar</span>
                </div>
                <p-toggleswitch inputId="exigeCodigoVoto" formControlName="exigeCodigoVoto" />
            </div>

            @if (form.get('codigoVoto')) {
                <div class="flex flex-col gap-2 pt-3 border-t border-dashed border-surface-200 dark:border-surface-700">
                    <label for="codigoVoto" class="text-sm font-medium text-surface-700 dark:text-surface-300">Código de
                        Votação</label>
                    <div class="flex flex-wrap items-center gap-3">
                        <p-input-otp id="codigoVoto" formControlName="codigoVoto" [length]="6" class="flex-1" />
                        <p-button
                            icon="pi pi-refresh"
                            severity="info"
                            [outlined]="true"
                            label="Gerar"
                            (onClick)="gerarCodigoAleatorio()"
                            styleClass="h-full"
                        />
                    </div>
                </div>
            }
        </div>

        <div class="flex justify-between border-t border-surface pt-4">
            <p-button
                type="button"
                label="Cancelar"
                icon="pi pi-times"
                [outlined]="true"
                severity="secondary"
                (click)="close()"
            />
            <p-button type="submit" label="Salvar" icon="pi pi-check" />
        </div>
    </div>
</form>
<pre>
    <code>
        {{ form.value|json }}
    </code>
</pre>
