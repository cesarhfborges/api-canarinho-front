<app-floating-configurator />
<div
    class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden bg-[url(/assets/imgs/wallpaper.jpg)] bg-cover bg-center bg-no-repeat">
    <div class="flex flex-col items-center justify-center">
        <div style="border-radius: 56px; padding: 0.25rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%)">
            <div class="w-full bg-surface-0 dark:bg-surface-900 py-14 px-8 sm:px-14 shadow-lg" style="border-radius: 53px">

                <div class="text-center mb-8">
                    <app-logotipo class="block mb-8 w-24 shrink-0 mx-auto" />
                    <div class="flex text-3xl font-bold mb-1 justify-center gap-2">
                        <span class="text-green-800">API</span>
                        <span class="text-yellow-400">Canarinho</span>
                    </div>
                    <div class="text-blue-700 dark:text-blue-400 font-bold mb-4">Sistema de API mock dinamico</div>
                </div>

                <div class="w-full md:w-100">
                    @if (configService.config().allow_register) {
                        <div class="dark:text-muted-color font-medium text-center mb-4">Cadastre-se para criar sua conta</div>

                        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
                            <label
                                for="name"
                                class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2"
                            >
                                Nome
                            </label>
                            <input
                                pInputText
                                id="name"
                                type="text"
                                placeholder="Seu nome completo"
                                class="mb-4"
                                formControlName="name"
                                [fluid]="true"
                            />

                            <label
                                for="email"
                                class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2"
                            >
                                Email
                            </label>
                            <input
                                pInputText
                                id="email"
                                type="email"
                                placeholder="Endereço de email"
                                class="mb-4"
                                formControlName="email"
                                [fluid]="true"
                            />

                            <label
                                for="password"
                                class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2"
                            >
                                Senha
                            </label>
                            <p-password
                                id="password"
                                formControlName="password"
                                placeholder="Senha"
                                [toggleMask]="true"
                                class="mb-4"
                                [fluid]="true"
                                [feedback]="false"
                            ></p-password>

                            <label
                                for="confirmPassword"
                                class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2"
                            >
                                Confirmar Senha
                            </label>
                            <p-password
                                id="confirmPassword"
                                formControlName="confirmPassword"
                                placeholder="Confirme a senha"
                                [toggleMask]="true"
                                class="mb-8"
                                [fluid]="true"
                                [feedback]="false"
                            ></p-password>

                            <p-button type="submit" label="Cadastrar" styleClass="w-full mb-4" [disabled]="isLoading()"></p-button>

                            <div class="flex items-center justify-center mt-2">
                                <span class="dark:text-muted-color">Já possui uma conta? </span>
                                <a routerLink="/login" class="font-medium no-underline ml-2 text-primary cursor-pointer hover:underline">Faça login</a>
                            </div>
                        </form>
                    } @else {
                        <div class="text-center py-8">
                            <i class="pi pi-lock text-5xl text-orange-500 mb-6"></i>
                            <h2 class="text-2xl font-bold mb-4 text-surface-900 dark:text-surface-0">Cadastro Bloqueado</h2>
                            <p class="text-muted-color mb-8 leading-relaxed">
                                A criação de novas contas está temporariamente desativada pelo administrador do sistema.
                            </p>
                            <p-button routerLink="/login" label="Voltar ao Login" icon="pi pi-arrow-left" styleClass="w-full"></p-button>
                        </div>
                    }
                </div>
            </div>
        </div>
    </div>
</div>
