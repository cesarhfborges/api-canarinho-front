<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen overflow-hidden bg-[url(/assets/imgs/wallpaper.jpg)] bg-cover bg-center bg-no-repeat">
    <div class="w-full flex flex-col items-center justify-center">
        <div class="w-5/6 md:w-4/5 lg:w-3/5 xl:w-2/5 2xl:w-1/3" style="border-radius: 56px; padding: 0.25rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%)">
            <div class="bg-surface-0 dark:bg-surface-900 py-14 px-8 sm:px-14 shadow-lg" style="border-radius: 53px">
                <div class="text-center mb-8">
                    <app-logotipo class="block mb-8 w-24 shrink-0 mx-auto" />
                    <div class="flex text-3xl font-bold mb-1 justify-center gap-2">
                        <span class="text-green-800">Nova</span>
                        <span class="text-yellow-400">Senha</span>
                    </div>
                    <div class="text-blue-700 dark:text-blue-400 font-bold mb-4">Crie uma nova senha para sua conta</div>
                </div>

                <div class="w-full">
                    @if(errorMessage()) {
                        <div class="text-red-500 text-center mb-4">{{ errorMessage() }}</div>
                    }
                    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
                        <label
                            for="password"
                            class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2"
                        >
                            Nova Senha
                        </label>
                        <p-password
                            id="password"
                            formControlName="password"
                            placeholder="Nova Senha"
                            [toggleMask]="true"
                            class="mb-4"
                            [fluid]="true"
                            [feedback]="true"
                        ></p-password>

                        <label
                            for="password_confirmation"
                            class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2"
                        >
                            Confirmar Nova Senha
                        </label>
                        <p-password
                            id="password_confirmation"
                            formControlName="password_confirmation"
                            placeholder="Confirmar Senha"
                            [toggleMask]="true"
                            class="mb-8"
                            [fluid]="true"
                            [feedback]="false"
                        ></p-password>

                        <p-button type="submit" label="Alterar Senha" styleClass="w-full mb-4" [disabled]="isLoading()"></p-button>

                        <div class="flex items-center justify-center mt-6">
                            <a routerLink="/login" class="font-medium no-underline text-primary cursor-pointer hover:underline">Voltar ao Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
