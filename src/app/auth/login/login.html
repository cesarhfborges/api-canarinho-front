<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen overflow-hidden bg-[url(/assets/imgs/wallpaper.jpg)] bg-cover bg-center bg-no-repeat">
    <div class="w-full flex flex-col items-center justify-center">
        <div class="w-5/6 md:w-4/5 lg:w-3/5 xl:w-2/5 2xl:w-1/3" style="border-radius: 56px; padding: 0.25rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%)">
            <div class="bg-surface-0 dark:bg-surface-900 py-14 px-8 sm:px-14 shadow-lg" style="border-radius: 53px">

                <div class="text-center mb-8">
                    <app-logotipo class="block mb-8 w-24 shrink-0 mx-auto" />
                    <div class="flex text-3xl font-bold mb-1 justify-center gap-2">
                        <span class="text-green-800">API</span>
                        <span class="text-yellow-400">Canarinho</span>
                    </div>
                    <div class="text-blue-700 dark:text-blue-400 font-bold mb-4">Sistema de API mock dinamico</div>
                </div>

                <div class="w-full">
                    <div class="dark:text-muted-color font-medium text-center mb-4">Efetue login para continuar</div>
                    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                        <label
                            for="username"
                            class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2"
                        >
                            Usuário
                        </label>
                        <input
                            #inputEmail
                            pInputText
                            id="username"
                            type="text"
                            name="username"
                            placeholder=""
                            inputmode="email"
                            class="mb-8"
                            formControlName="username"
                            [fluid]="true"
                        />

                        <label
                            for="password1"
                            class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2"
                        >
                            Senha
                        </label>
                        <p-password
                            id="password1"
                            formControlName="password"
                            placeholder=""
                            [toggleMask]="true"
                            inputmode="email"
                            name="password"
                            class="mb-4"
                            [fluid]="true"
                            [feedback]="false"
                        ></p-password>

                        <div class="flex items-center justify-between mt-2 mb-8 gap-8">
                            <div class="flex items-center">
                                <p-checkbox formControlName="remember" id="rememberme1" binary class="mr-2"></p-checkbox>
                                <label for="rememberme1">Lembrar</label>
                            </div>
                            <span routerLink="/forgot-password" class="font-medium no-underline ml-2 text-right cursor-pointer text-orange-500 hover:underline">Esqueci a senha</span>
                        </div>
                        <p-button type="submit" label="Entrar" styleClass="w-full" [disabled]="isLoading()"></p-button>

                        @if (configService.config().allow_register === true) {
                        <div class="flex items-center justify-center mt-6">
                            <span class="dark:text-muted-color">Não possui uma conta? </span>
                            <a routerLink="/register" class="font-medium no-underline ml-2 text-primary cursor-pointer hover:underline">Cadastre-se</a>
                        </div>
                        }
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
